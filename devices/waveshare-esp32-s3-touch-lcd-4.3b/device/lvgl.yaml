# =============================================================================
# LVGL MAIN PAGE - Top-layer HUD and button grid
# =============================================================================
# Defines the primary UI: a top-layer overlay with temperature and clock
# labels, and the main page containing a 3x5 grid of 15 button widgets.
# Uses LVGL grid layout for sparse cell placement on the 800x480 display.
# =============================================================================

lvgl:
  top_layer:
    widgets:
      - label:
          text: "-°C / -°C"
          id: temperatures
          text_font: font_roboto_regular_20_default
          align: top_left
          x: 8
          y: 6
          text_color: 0xFFFFFF
          hidden: true
      - label:
          text: "--:--"
          id: display_time
          text_font: font_roboto_regular_20_default
          align: top_mid
          x: 0
          y: 6
          text_align: center
          text_color: 0xFFFFFF
          hidden: true
      - obj:
          id: network_status_button
          align: top_right
          x: -14
          y: 1
          width: 36
          height: 32
          bg_opa: 0%
          border_width: 0
          pad_all: 0
          scrollable: false
          scrollbar_mode: "off"
          clickable: true
          hidden: true
          widgets:
            - label:
                id: network_status_icon_label
                text: "\U000F0928"
                text_font: font_mdi_19_network
                align: center
                text_align: center
                text_color: 0xFFFFFF
          on_press:
            then:
              - script.execute: network_status_open_info

  pages:
    - id: main_page
      scrollbar_mode: "off"
      layout:
        type: grid
        grid_columns: [FR(1), FR(1), FR(1), FR(1), FR(1)]
        grid_rows: [FR(1), FR(1), FR(1)]
        pad_row: 8
        pad_column: 8
      width: 100%
      bg_color: Black
      bg_opa: cover
      pad_top: ${main_page_pad_top}
      pad_bottom: 4
      pad_left: 4
      pad_right: 4

      widgets:
        - !include { file: ../../../common/device/button_widget.yaml, vars: { num: "1" } }
        - !include { file: ../../../common/device/button_widget.yaml, vars: { num: "2" } }
        - !include { file: ../../../common/device/button_widget.yaml, vars: { num: "3" } }
        - !include { file: ../../../common/device/button_widget.yaml, vars: { num: "4" } }
        - !include { file: ../../../common/device/button_widget.yaml, vars: { num: "5" } }
        - !include { file: ../../../common/device/button_widget.yaml, vars: { num: "6" } }
        - !include { file: ../../../common/device/button_widget.yaml, vars: { num: "7" } }
        - !include { file: ../../../common/device/button_widget.yaml, vars: { num: "8" } }
        - !include { file: ../../../common/device/button_widget.yaml, vars: { num: "9" } }
        - !include { file: ../../../common/device/button_widget.yaml, vars: { num: "10" } }
        - !include { file: ../../../common/device/button_widget.yaml, vars: { num: "11" } }
        - !include { file: ../../../common/device/button_widget.yaml, vars: { num: "12" } }
        - !include { file: ../../../common/device/button_widget.yaml, vars: { num: "13" } }
        - !include { file: ../../../common/device/button_widget.yaml, vars: { num: "14" } }
        - !include { file: ../../../common/device/button_widget.yaml, vars: { num: "15" } }
