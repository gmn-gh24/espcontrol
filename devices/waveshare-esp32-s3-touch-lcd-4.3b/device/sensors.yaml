# =============================================================================
# SENSORS - Dynamic HA entity subscriptions (Waveshare 4.3B - 15 buttons, 5×3)
# =============================================================================

globals:
  - id: indoor_temp
    type: float
    initial_value: 'NAN'
  - id: outdoor_temp
    type: float
    initial_value: 'NAN'

script:
  - id: refresh_button_grid
    then:
      - lambda: |-
          // BEGIN GENERATED REFRESH GRID WIRING
          // Generated by scripts/generate_device_slots.py from devices/manifest.json.
          #define BTN_SLOT(n) { button_##n##_config, button_##n, button_##n##_icon_label, button_##n##_text_label, button_##n##_sensor_container, button_##n##_sensor_label, button_##n##_unit_label }
          BtnSlot slots[] = {
            BTN_SLOT(1),
            BTN_SLOT(2),
            BTN_SLOT(3),
            BTN_SLOT(4),
            BTN_SLOT(5),
            BTN_SLOT(6),
            BTN_SLOT(7),
            BTN_SLOT(8),
            BTN_SLOT(9),
            BTN_SLOT(10),
            BTN_SLOT(11),
            BTN_SLOT(12),
            BTN_SLOT(13),
            BTN_SLOT(14),
            BTN_SLOT(15),
          };
          #undef BTN_SLOT
          if (!id(screen_rotation_ready)) return;
          GridConfig cfg = {};
          cfg.num_slots = 15;
          bool portrait = id(screen_rotation_select).current_option() == "90" || id(screen_rotation_select).current_option() == "270";
          cfg.cols = portrait ? 3 : 5;
          cfg.width_compensation_vertical = portrait;
          cfg.wrap_tall_labels = true;
          cfg.volume_width_compensation_percent = 95;
          cfg.icon_font = id(font_mdi_50_icons)->get_lv_font();
          cfg.sp_sensor_font = id(font_roboto_light_50_digits)->get_lv_font();
          cfg.sp_large_sensor_font = id(font_roboto_thin_125_digits)->get_lv_font();
          cfg.large_sensor_unit_offset_percent = -10;
          cfg.media_title_font = id(font_roboto_light_38_text)->get_lv_font();
          cfg.volume_number_font = id(font_roboto_thin_110_text)->get_lv_font();
          cfg.volume_label_font = id(font_roboto_regular_26_text)->get_lv_font();
          cfg.climate_card_icon_font = id(font_mdi_38_icons)->get_lv_font();
          cfg.climate_option_title_font = id(font_roboto_regular_22_text)->get_lv_font();
          cfg.climate_option_value_font = id(font_roboto_regular_22_text)->get_lv_font();
          cfg.temperature_unit = id(temperature_unit_select).current_option();
          cfg.timezone = id(timezone_select).current_option();
          cfg.pause_home_idle = []() {
            id(home_screen_idle_suspended) = true;
            id(home_screen_idle_check).stop();
          };
          cfg.resume_home_idle = []() {
            id(home_screen_idle_suspended) = false;
            id(home_screen_idle_check).execute();
          };
          set_width_compensation_vertical_axis(cfg.width_compensation_vertical);
          apply_width_compensation(id(display_time), cfg.width_compensation_percent);
          apply_width_compensation(id(temperatures), cfg.width_compensation_percent);
          apply_width_compensation(id(clock_label), cfg.width_compensation_percent);
          // END GENERATED REFRESH GRID WIRING
          grid_refresh_layout(slots, cfg,
            id(button_order).state,
            id(main_page)->obj);
